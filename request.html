<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Idea – Digitoe Cards</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Digitoe Cards</a>
      <a href="request.html" class="nav-center">Request Idea</a>
      <div class="nav-right">
        <div class="nav-auth">
          <a href="#" class="nav-link" onclick="alert('Coming soon')">Sign Up</a>
          <a href="#" class="nav-link" onclick="alert('Coming soon')">Login</a>
        </div>
      </div>
      <button class="hamburger" id="hamburger" onclick="toggleMenu()">☰</button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <a href="request.html" class="mobile-link mobile-cta">Request Idea</a>
      <a href="#" class="mobile-link" onclick="alert('Coming soon')">Sign Up</a>
      <a href="#" class="mobile-link" onclick="alert('Coming soon')">Login</a>
    </div>

    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMenu()"></div>
  </nav>

  <!-- FORM -->
  <div class="request-wrap">
    <div class="request-box">
      <p class="request-title">Request Idea</p>

      <div class="field">
        <label>Your Name</label>
        <input type="text" id="userName" placeholder="Ash Ketchum" />
      </div>

      <div class="field">
        <label>Your Email</label>
        <input type="email" id="userEmail" placeholder="ash@pokemon.com" />
      </div>

      <div class="field">
        <label>What should I make next?</label>
        <textarea id="userIdea" rows="4" placeholder="A birthday countdown game..."></textarea>
      </div>

      <div class="field">
        <label>Rate Not PKMN Gender Reveal</label>
        <div class="stars" id="starRating">
          <span class="star-btn" data-value="1">★</span>
          <span class="star-btn" data-value="2">★</span>
          <span class="star-btn" data-value="3">★</span>
          <span class="star-btn" data-value="4">★</span>
          <span class="star-btn" data-value="5">★</span>
        </div>
      </div>

      <p id="formError" class="form-error"></p>
      <p id="formSuccess" class="form-success"></p>

      <button id="submitBtn" onclick="submitForm()">Submit</button>
    </div>
  </div>

  <script>
    emailjs.init("iZyVZQ756L9ZVifyO"); // replace after EmailJS Public Key setup

    let selectedRating = 0;

    // star rating
    document.querySelectorAll('.star-btn').forEach(star => {
      star.addEventListener('click', () => {
        selectedRating = parseInt(star.dataset.value);
        document.querySelectorAll('.star-btn').forEach(s => {
          s.classList.toggle('active', parseInt(s.dataset.value) <= selectedRating);
        });
      });
    });

    function submitForm() {
      const name = document.getElementById('userName').value.trim();
      const email = document.getElementById('userEmail').value.trim();
      const idea = document.getElementById('userIdea').value.trim();
      const errorEl = document.getElementById('formError');
      const successEl = document.getElementById('formSuccess');
      const btn = document.getElementById('submitBtn');

      errorEl.textContent = '';
      successEl.textContent = '';

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!name || !email || !idea || !selectedRating) {
        errorEl.textContent = 'Please fill in all fields and select a rating.';
        return;
      }

      if (!emailRegex.test(email)) {
        errorEl.textContent = 'Please enter a valid email address.';
        return;
      }

      btn.textContent = 'Sending...';
      btn.disabled = true;

      emailjs.send("service_0ti44hh", "template_dhflkj1", {
        from_name: name,
        from_email: email,
        idea: idea,
        rating: selectedRating + ' / 5 stars',
      }).then(() => {
        successEl.textContent = 'Sent! Thank you for your feedback.';
        btn.textContent = 'Submit';
        btn.disabled = false;
        document.getElementById('userName').value = '';
        document.getElementById('userEmail').value = '';
        document.getElementById('userIdea').value = '';
        selectedRating = 0;
        document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
      }).catch(() => {
        errorEl.textContent = 'Something went wrong. Please try again.';
        btn.textContent = 'Submit';
        btn.disabled = false;
      });
    }

    // mobile menu
    function toggleMenu() {
      const menu = document.getElementById("mobileMenu");
      const overlay = document.getElementById("mobileOverlay");
      const hamburger = document.getElementById("hamburger");
      const isOpen = menu.classList.toggle("open");
      overlay.classList.toggle("open");
      hamburger.textContent = isOpen ? "✕" : "☰";
    }

    function closeMenu() {
      document.getElementById("mobileMenu").classList.remove("open");
      document.getElementById("mobileOverlay").classList.remove("open");
      document.getElementById("hamburger").textContent = "☰";
    }
  </script>

</body>
</html>
